<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字 랜덤 학습기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    justify-content: center;
    padding: 20px;
    user-select: none;
    gap: 24px;
  }
  .study-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 0 0 auto;
    min-width: 0;
  }
  .kanji-list-panel {
    width: 260px;
    flex: 0 0 260px;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 12px 10px;
    height: calc(100vh - 40px);
    overflow-y: auto;
    position: sticky;
    top: 20px;
  }
  .kanji-list-panel h3 {
    font-size: 0.85rem;
    color: #a29bfe;
    margin-bottom: 8px;
    text-align: center;
    letter-spacing: 1px;
  }
  .list-level-header {
    font-size: 0.7rem;
    color: #6c63ff;
    font-weight: bold;
    margin: 8px 0 4px;
    padding: 2px 4px;
    border-bottom: 1px solid #2a2a4a;
  }
  .list-kanji-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
  }
  .list-kanji {
    font-size: 0.78rem;
    padding: 2px 4px;
    border-radius: 3px;
    cursor: default;
    color: #666;
    font-family: 'Noto Sans JP', serif;
    white-space: nowrap;
  }
  .list-kanji.known { color: #74b9ff; }
  .list-kanji.failed { color: #ff7675; }
  h1 { font-size: 1.5rem; margin-bottom: 12px; color: #fff; }
  .controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
  .controls button {
    padding: 8px 20px; border: 2px solid #333; border-radius: 8px;
    background: #1a1a2e; color: #888; font-size: 0.95rem; cursor: pointer; transition: all 0.2s;
  }
  .controls button:hover { border-color: #666; color: #ccc; }
  .controls button.active { border-color: #6c63ff; background: #6c63ff18; color: #a29bfe; font-weight: bold; }
  .controls button .cnt { font-size: 0.75rem; opacity: 0.7; }
  .stats { font-size: 0.85rem; color: #666; margin-bottom: 18px; }
  .card {
    background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px;
    padding: 36px 28px; text-align: center; width: 100%; max-width: 400px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4); min-height: 380px;
    display: flex; flex-direction: column; justify-content: center; gap: 12px;
    cursor: pointer; transition: transform 0.15s;
  }
  .card:active { transform: scale(0.98); }
  .kanji {
    font-size: 7rem; font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic Pro', 'MS Gothic', serif;
    color: #fff; line-height: 1.1; margin-bottom: 4px;
  }
  .meaning-kr { font-size: 1.5rem; color: #ffd93d; font-weight: bold; margin-bottom: 4px; }
  .info-row {
    display: flex; justify-content: center; align-items: baseline; gap: 8px;
    font-size: 1rem; padding: 7px 0; border-bottom: 1px solid #1f1f3a;
  }
  .info-row:last-child { border-bottom: none; }
  .label {
    background: #2a2a4a; color: #a29bfe; padding: 2px 10px; border-radius: 4px;
    font-size: 0.78rem; font-weight: bold; min-width: 42px; text-align: center; flex-shrink: 0;
  }
  .value { font-size: 1.05rem; color: #ddd; word-break: keep-all; }
  .level-badge {
    display: inline-block; font-size: 0.7rem; padding: 2px 8px; border-radius: 4px;
    font-weight: bold; margin-top: 4px;
  }
  .level-n3 { background: #00b89433; color: #00b894; border: 1px solid #00b89455; }
  .level-n2 { background: #0984e333; color: #74b9ff; border: 1px solid #0984e355; }
  .level-n1 { background: #d6303133; color: #ff7675; border: 1px solid #d6303155; }
  .hidden { visibility: hidden; }
  .examples { margin-top: 8px; }
  .example-item {
    display: flex; justify-content: center; align-items: baseline; gap: 8px;
    font-size: 0.95rem; padding: 4px 0;
  }
  .example-word { color: #fff; font-size: 1.15rem; font-weight: bold; font-family: 'Noto Sans JP', serif; }
  .example-reading { color: #a29bfe; font-size: 0.85rem; }
  .example-meaning { color: #ffd93d; font-size: 0.85rem; }
  .actions { margin-top: 18px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn {
    padding: 12px 28px; border: none; border-radius: 10px;
    font-size: 1rem; cursor: pointer; transition: all 0.2s; font-weight: bold;
  }
  .btn-reveal { background: #6c63ff; color: #fff; }
  .btn-reveal:hover { background: #5a52d5; }
  .btn-reveal:disabled { background: #333; color: #666; cursor: default; }
  .btn-known { background: #00b894; color: #fff; }
  .btn-known:hover { background: #00a381; }
  .btn-unknown { background: #d63031; color: #fff; }
  .btn-unknown:hover { background: #b52728; }
  .btn-reset { background: transparent; color: #666; border: 1px solid #333; font-size: 0.8rem; padding: 6px 14px; }
  .btn-reset:hover { color: #ff7675; border-color: #ff7675; }
  .hint { margin-top: 14px; font-size: 0.78rem; color: #444; }
  .progress-bar {
    width: 100%; max-width: 400px; height: 4px; background: #1a1a2e;
    border-radius: 2px; margin-bottom: 18px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: #6c63ff; transition: width 0.3s; border-radius: 2px; }
  .mode-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center; }
  .mode-tabs button {
    padding: 6px 16px; border: 2px solid #333; border-radius: 20px;
    background: #1a1a2e; color: #888; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
  }
  .mode-tabs button:hover { border-color: #666; color: #ccc; }
  .mode-tabs button.active { border-color: #ffd93d; background: #ffd93d18; color: #ffd93d; font-weight: bold; }
  .mode-tabs .mode-cnt { font-size: 0.7rem; opacity: 0.7; margin-left: 2px; }
  .kanji-stats {
    display: flex; justify-content: center; gap: 12px; margin-top: 4px; font-size: 0.75rem;
  }
  .kanji-stats .stat-ok { color: #00b894; }
  .kanji-stats .stat-fail { color: #ff7675; }
  .empty-msg {
    color: #666; font-size: 1.1rem; text-align: center; padding: 40px 20px; line-height: 1.8;
  }
  .etymology-panel {
    width: 240px;
    flex: 0 0 240px;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 16px 12px;
    height: calc(100vh - 40px);
    overflow-y: auto;
    position: sticky;
    top: 20px;
    display: none;
    order: -1;
  }
  .etymology-panel.visible { display: block; }
  .etymology-panel h3 {
    font-size: 0.85rem;
    color: #ffd93d;
    margin-bottom: 12px;
    text-align: center;
    letter-spacing: 1px;
  }
  .tip-kanji {
    font-size: 3.5rem;
    text-align: center;
    margin-bottom: 14px;
    font-family: 'Noto Sans JP', serif;
    color: #fff;
    line-height: 1.1;
  }
  .tip-section { margin-bottom: 14px; }
  .tip-section-title {
    font-size: 0.72rem;
    color: #a29bfe;
    font-weight: bold;
    margin-bottom: 6px;
    padding: 2px 8px;
    background: #2a2a4a;
    border-radius: 4px;
    display: inline-block;
  }
  .tip-content {
    font-size: 0.88rem;
    color: #ccc;
    line-height: 1.75;
    word-break: keep-all;
  }
  .tip-empty {
    color: #555;
    font-size: 0.82rem;
    text-align: center;
    padding: 16px 4px;
    line-height: 1.8;
  }
  @media (max-width: 900px) {
    .etymology-panel { display: none !important; }
  }
</style>
</head>
<body>

<div class="etymology-panel" id="etymology-panel">
  <h3>유래 &amp; 암기팁</h3>
  <div id="tip-content-area"></div>
</div>

<div class="study-area">
<h1>漢字 랜덤 학습기</h1>

<div class="mode-tabs">
  <button id="mode-all" class="active" onclick="setMode('all')">전체</button>
  <button id="mode-review" onclick="setMode('review')">못외운 한자 <span class="mode-cnt" id="mode-review-cnt"></span></button>
  <button id="mode-mastered" onclick="setMode('mastered')">복습 <span class="mode-cnt" id="mode-mastered-cnt"></span></button>
</div>

<div class="controls">
  <button id="btn-n3" class="active" onclick="toggleLevel('n3')">N3 <span class="cnt" id="cnt-n3"></span></button>
  <button id="btn-n2" class="active" onclick="toggleLevel('n2')">N2 <span class="cnt" id="cnt-n2"></span></button>
  <button id="btn-n1" class="active" onclick="toggleLevel('n1')">N1 <span class="cnt" id="cnt-n1"></span></button>
</div>

<div class="stats" id="stats"></div>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="card" id="card">
  <div class="kanji" id="kanji"></div>
  <div id="details" class="hidden">
    <div class="meaning-kr" id="meaning-kr"></div>
    <div class="info-row">
      <span class="label">훈독</span>
      <span class="value" id="kun"></span>
    </div>
    <div class="info-row">
      <span class="label">음독</span>
      <span class="value" id="on"></span>
    </div>
    <div class="info-row">
      <span class="label">뜻</span>
      <span class="value" id="meaning"></span>
    </div>
    <div class="info-row">
      <span class="label">음</span>
      <span class="value" id="kr"></span>
    </div>
    <div class="examples" id="examples"></div>
    <div>
      <span class="level-badge" id="level-badge"></span>
    </div>
    <div class="kanji-stats" id="kanji-stats"></div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-reveal" id="btn-show" onclick="revealAnswer()">정답 보기 (Space)</button>
  <button class="btn btn-known" id="btn-known" onclick="markKnown()" style="display:none">외웠어요 (→)</button>
  <button class="btn btn-unknown" id="btn-unknown" onclick="markUnknown()" style="display:none">못외웠어요 (←)</button>
</div>

<div class="hint">Space: 정답 보기 &nbsp;|&nbsp; ←: 못외웠어요 &nbsp;|&nbsp; →: 외웠어요</div>

<div style="margin-top: 24px;">
  <button class="btn btn-reset" onclick="resetHistory()">학습 기록 초기화</button>
</div>

</div><!-- /.study-area -->

<div class="kanji-list-panel" id="kanji-list-panel">
  <h3>한자 목록</h3>
  <div id="kanji-list-items"></div>
</div>

<script>
const DATA = {"n3":[{"kanji":"一","kun":"ひと-, ひと.つ","on":"イチ, イツ","meanings":"one, one radical (no.1)","kr":"일","krMeaning":"한"},{"kanji":"七","kun":"なな, なな.つ, なの","on":"シチ","meanings":"seven","kr":"칠","krMeaning":"일곱 칠"},{"kanji":"万","kun":"よろず","on":"バン, マン","meanings":"10,000, ten thousand","kr":"만","krMeaning":"일만"},{"kanji":"三","kun":"み, み.つ, みっ.つ","on":"サン, ゾウ","meanings":"three","kr":"삼","krMeaning":"석"},{"kanji":"上","kun":"-あ.がり, -あ.がる, -あ.げる, -うえ, あ.がり, あ.がる, あ.げる, うえ, うわ-, かみ, たてまつ.る, のぼ.す, のぼ.せる, のぼ.り, のぼ.る","on":"シャン, ショウ, ジョウ","meanings":"above, up","kr":"상","krMeaning":"위"},{"kanji":"下","kun":"-くだ.す, お.りる, お.ろす, くだ.さる, くだ.す, くだ.り, くだ.る, さ.がる, さ.げる, した, しも, もと","on":"カ, ゲ","meanings":"below, descend, down, give, inferior, low","kr":"하","krMeaning":"아래"},{"kanji":"中","kun":"あた.る, うち, なか","on":"チュウ","meanings":"center, in, inside, mean, middle","kr":"중","krMeaning":"가운데"},{"kanji":"九","kun":"ここの, ここの.つ","on":"キュウ, ク","meanings":"nine","kr":"구","krMeaning":"아홉"},{"kanji":"二","kun":"ふた, ふた.つ, ふたたび","on":"ジ, ニ","meanings":"two, two radical (no. 7)","kr":"이","krMeaning":"두 이"},{"kanji":"五","kun":"いつ, いつ.つ","on":"ゴ","meanings":"five","kr":"오","krMeaning":"다섯"},{"kanji":"人","kun":"-と, -り, ひと","on":"ジン, ニン","meanings":"person","kr":"인","krMeaning":"사람"},{"kanji":"今","kun":"いま","on":"キン, コン","meanings":"now","kr":"금","krMeaning":"이제"},{"kanji":"休","kun":"やす.まる, やす.む, やす.める","on":"キュウ","meanings":"day off, rest, retire, sleep","kr":"휴","krMeaning":"쉴"},{"kanji":"何","kun":"なに, なに-, なん, なん-","on":"カ","meanings":"what","kr":"하","krMeaning":"어찌"},{"kanji":"先","kun":"さき, ま.ず","on":"セン","meanings":"ahead, before, future, precedence, previous","kr":"선","krMeaning":"먼저"},{"kanji":"入","kun":"-い.り, -い.る, -い.れ, い.る, い.れる, はい.る","on":"ジュ, ニュウ","meanings":"enter, insert","kr":"입","krMeaning":"들"},{"kanji":"八","kun":"や, や.つ, やっ.つ, よう","on":"ハチ, ハツ","meanings":"eight, eight radical (no. 12)","kr":"팔","krMeaning":"여덟"},{"kanji":"六","kun":"む, む.つ, むい, むっ.つ","on":"リク, ロク","meanings":   "心": { etymology: "심장의 모양을 본뜬 상형문자. 心臓(심장)·心(마음)은 같은 뿌리.", tip: "구불구불한 세 점 = 심장 박동 = 心(마음). 부수로 쓰일 때는 忄(심방변)." },
  "愛": { etymology: "心(마음)을 품고 발을 멈추어(夂) 되돌아보는 모습. 애틋한 마음.", tip: "마음(心)을 품은 복잡한 글자 = 愛(사랑). 愛情·愛着으로 암기." },
  "体": { etymology: "원래 體. 人(사람)+本(근본)으로 단순화. 몸이 사람의 근본.", tip: "亻(인변)+本(근본) = 体(몸). '体育'(체육)·'体験'(체험)으로 암기." },
  "道": { etymology: "首(머리·방향)와 辶(걷다)의 회의문자. 방향을 정해 걷는 것 = 길·도리.", tip: "辶(나아가다)+首(머리) = 道(길·도). 道路·道徳처럼 방향·원리에 쓰인다." },
  "食": { etymology: "그릇(皀) 위에 뚜껑이 씌워진 모양에서 유래. 먹을 것을 담은 그릇.", tip: "뚜껑 덮인 그릇 = 食(먹다). 食べる·食事(식사)로 암기." },
  "見": { etymology: "目(눈) 위에 人(사람)의 다리를 그려 '눈을 크게 뜨고 보는 사람'을 표현.", tip: "目(눈)+발 = 見(보다). 見る·意見(의견)으로 암기." },
  "書": { etymology: "붓(聿)으로 쓰는 행위를 나타낸 글자. 아래 曰은 가로선이 쌓인 문서.", tip: "붓으로 가로선 긋기 = 書(쓰다). 図書館(도서관)·読書(독서)로 암기." },
  "読": { etymology: "言(말)+売(팔다→音 독)의 형성문자. 売가 음(ドク·よむ)을 담당.", tip: "言(말)을 팔듯 소리 내다 = 読(읽다). 読書·読む로 암기." },
};

let activeLevels = { n3: true, n2: true, n1: true };
let pool = [];
let seen = 0;
let revealed = false;
let currentEntry = null;
let currentMode = 'all'; // 'all', 'review', 'mastered'
// 탭별 진행 상태 보존 (탭 이동 시 초기화 방지)
let modeState = { all: null, review: null, mastered: null };

// === localStorage 학습 기록 ===
const STORAGE_KEY = 'hanja_history';

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}

function saveHistory(h) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(h));
}

function getRecord(kanji) {
  const h = loadHistory();
  return h[kanji] || { ok: 0, fail: 0 };
}

function recordResult(kanji, known) {
  const h = loadHistory();
  if (!h[kanji]) h[kanji] = { ok: 0, fail: 0 };
  if (known) {
    // 복습 탭에서 이미 외운 한자면 중복 저장 스킵
    if (currentMode === 'mastered' && h[kanji].ok > 0) {
      updateModeCounts();
      return;
    }
    h[kanji].ok++;
    // 복습모드가 아닐 때, 외웠으면 review에서 제거 (졸업)
    if (currentMode === 'review') h[kanji].fail = 0;
  } else {
    // 못외운 한자 탭에서 이미 실패한 한자면 중복 저장 스킵
    if (currentMode === 'review' && h[kanji].fail > 0) {
      updateModeCounts();
      return;
    }
    h[kanji].fail++;
  }
  saveHistory(h);
  updateModeCounts();
  buildKanjiList();
}

function resetHistory() {
  if (!confirm('학습 기록을 모두 초기화할까요?')) return;
  localStorage.removeItem(STORAGE_KEY);
  modeState = { all: null, review: null, mastered: null };
  updateModeCounts();
  buildPool();
  nextKanji();
  buildKanjiList();
}

// === 모드 탭 ===
function setMode(mode) {
  if (mode === currentMode) return;
  // 현재 탭 상태 저장
  modeState[currentMode] = { pool: pool, seen: seen, currentEntry: currentEntry };
  currentMode = mode;
  document.querySelectorAll('.mode-tabs button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('mode-' + mode).classList.add('active');
  // 저장된 상태가 있으면 복원, 없으면 새로 빌드
  if (modeState[mode]) {
    pool = modeState[mode].pool;
    seen = modeState[mode].seen;
    if (seen > 0) seen--; // 마지막에 보던 카드를 다시 표시
    nextKanji();
  } else {
    buildPool();
    nextKanji();
  }
}

function updateModeCounts() {
  const h = loadHistory();
  let reviewCount = 0, masteredCount = 0;
  // 현재 활성 레벨의 한자만 카운트
  for (const [level, entries] of Object.entries(DATA)) {
    if (!activeLevels[level]) continue;
    for (const e of entries) {
      const rec = h[e.kanji];
      if (rec && rec.fail > 0 && rec.ok === 0) reviewCount++; // pool 조건과 일치
      if (rec && rec.ok > 0) masteredCount++;
    }
  }
  document.getElementById('mode-review-cnt').textContent = reviewCount > 0 ? '(' + reviewCount + ')' : '';
  document.getElementById('mode-mastered-cnt').textContent = masteredCount > 0 ? '(' + masteredCount + ')' : '';
}

// === 풀 구성 ===
// === 한자 목록 렌더링 ===
function buildKanjiList() {
  const h = loadHistory();
  const container = document.getElementById('kanji-list-items');
  if (!container) return;
  let html = '';
  let num = 1;
  const levels = [
    { key: 'n3', label: 'N3' },
    { key: 'n2', label: 'N2' },
    { key: 'n1', label: 'N1' }
  ];
  for (const { key, label } of levels) {
    if (!DATA[key] || DATA[key].length === 0) continue;
    html += '<div class="list-level-header">' + label + '</div><div class="list-kanji-grid">';
    for (const e of DATA[key]) {
      const rec = h[e.kanji] || { ok: 0, fail: 0 };
      let cls = 'list-kanji';
      if (rec.ok > 0) cls += ' known';
      else if (rec.fail > 0) cls += ' failed';
      const tip = (e.krMeaning || e.meanings || '').replace(/"/g, '&quot;');
      html += '<span class="' + cls + '" title="' + tip + '">' + num + '.' + e.kanji + '</span>';
      num++;
    }
    html += '</div>';
  }
  container.innerHTML = html;
}

function init() {
  document.getElementById('cnt-n3').textContent = '(' + DATA.n3.length + '자)';
  document.getElementById('cnt-n2').textContent = '(' + DATA.n2.length + '자)';
  document.getElementById('cnt-n1').textContent = '(' + DATA.n1.length + '자)';
  updateModeCounts();
  buildPool();
  nextKanji();
  buildKanjiList();
}

function buildPool() {
  const h = loadHistory();
  pool = [];
  for (const [level, entries] of Object.entries(DATA)) {
    if (!activeLevels[level]) continue;
    for (const e of entries) {
      const rec = h[e.kanji] || { ok: 0, fail: 0 };
      if (currentMode === 'review' && (rec.fail <= 0 || rec.ok > 0)) continue;
      if (currentMode === 'mastered' && rec.ok <= 0) continue;
      pool.push({ ...e, level });
    }
  }
  // 셔플
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  seen = 0;
  updateStats();
}

function toggleLevel(level) {
  activeLevels[level] = !activeLevels[level];
  if (!Object.values(activeLevels).some(Boolean)) { activeLevels[level] = true; return; }
  document.getElementById('btn-' + level).classList.toggle('active', activeLevels[level]);
  // 레벨이 바뀌면 풀 구성이 달라지므로 모든 탭 상태 초기화
  modeState = { all: null, review: null, mastered: null };
  updateModeCounts();
  buildPool();
  nextKanji();
}

function updateStats() {
  const h = loadHistory();
  let masteredCount = 0, totalCount = 0;
  for (const [level, entries] of Object.entries(DATA)) {
    if (!activeLevels[level]) continue;
    totalCount += entries.length;
    for (const e of entries) {
      const rec = h[e.kanji];
      if (rec && rec.ok > 0) masteredCount++;
    }
  }
  const modeLabel = currentMode === 'review' ? ' (못외운 한자)' : currentMode === 'mastered' ? ' (복습)' : '';
  document.getElementById('stats').textContent = masteredCount + ' / ' + totalCount + '자 외움' + modeLabel;
  document.getElementById('progress').style.width = (totalCount > 0 ? (masteredCount / totalCount) * 100 : 0) + '%';
}

function showButtons(state) {
  document.getElementById('btn-show').style.display = state === 'reveal' ? '' : 'none';
  document.getElementById('btn-known').style.display = state === 'judge' ? '' : 'none';
  document.getElementById('btn-unknown').style.display = state === 'judge' ? '' : 'none';
}

function renderExamples(kanji) {
  const el = document.getElementById('examples');
  const exs = typeof EXAMPLES !== 'undefined' && EXAMPLES[kanji];
  if (!exs || exs.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = '<div class="info-row"><span class="label">예시</span></div>' +
    exs.map(function(ex) {
      return '<div class="example-item">' +
        '<span class="example-word">' + ex.w + '</span>' +
        '<span class="example-reading">' + ex.r + '</span>' +
        '<span class="example-meaning">' + ex.m + '</span>' +
      '</div>';
    }).join('');
}

function renderTip(kanji) {
  const panel = document.getElementById('etymology-panel');
  const area = document.getElementById('tip-content-area');
  const tip = typeof TIPS !== 'undefined' && TIPS[kanji];
  let html = '<div class="tip-kanji">' + kanji + '</div>';
  if (!tip) {
    html += '<div class="tip-empty">이 한자의 유래·팁 정보가<br>아직 준비되지 않았습니다.</div>';
  } else {
    if (tip.etymology) {
      html += '<div class="tip-section"><span class="tip-section-title">형성 유래</span><div class="tip-content">' + tip.etymology + '</div></div>';
    }
    if (tip.tip) {
      html += '<div class="tip-section"><span class="tip-section-title">암기 팁</span><div class="tip-content">' + tip.tip + '</div></div>';
    }
  }
  area.innerHTML = html;
  panel.classList.add('visible');
}

function renderKanjiStats(kanji) {
  const rec = getRecord(kanji);
  const el = document.getElementById('kanji-stats');
  if (rec.ok === 0 && rec.fail === 0) { el.innerHTML = ''; return; }
  el.innerHTML =
    '<span class="stat-ok">외움 ' + rec.ok + '회</span>' +
    '<span class="stat-fail">못외움 ' + rec.fail + '회</span>';
}

function showEmpty() {
  document.getElementById('kanji').textContent = '';
  document.getElementById('details').classList.add('hidden');
  document.getElementById('kanji-stats').innerHTML = '';
  document.getElementById('etymology-panel').classList.remove('visible');
  const card = document.getElementById('card');
  const msg = currentMode === 'review'
    ? '못외운 한자가 없습니다!<br><br>전체 모드에서 학습을 시작해보세요.'
    : currentMode === 'mastered'
    ? '아직 외운 한자가 없습니다.<br><br>전체 모드에서 학습을 시작해보세요.'
    : '선택된 레벨에 한자가 없습니다.';
  document.getElementById('kanji').innerHTML = '<div class="empty-msg">' + msg + '</div>';
  showButtons('reveal');
  document.getElementById('btn-show').disabled = true;
}

function nextKanji() {
  if (pool.length === 0) { showEmpty(); return; }
  if (seen >= pool.length) {
    if (currentMode === 'review') {
      // 못외운 한자 모드에서 다 돌면 풀 재구성
      buildPool();
      if (pool.length === 0) { showEmpty(); return; }
    } else {
      buildPool();
    }
  }
  const e = pool[seen];
  currentEntry = e;
  document.getElementById('kanji').textContent = e.kanji;
  document.getElementById('kun').textContent = e.kun || '-';
  document.getElementById('on').textContent = e.on || '-';
  document.getElementById('meaning').textContent = e.krMeaning || e.meanings || '-';
  document.getElementById('kr').textContent = e.kr || '-';
  document.getElementById('meaning-kr').textContent =
    (e.krMeaning ? e.krMeaning : '') + (e.kr ? ' [' + e.kr + ']' : '');
  renderExamples(e.kanji);
  renderKanjiStats(e.kanji);
  const badge = document.getElementById('level-badge');
  badge.textContent = e.level.toUpperCase();
  badge.className = 'level-badge level-' + e.level;
  document.getElementById('details').classList.add('hidden');
  document.getElementById('kanji-stats').style.visibility = 'hidden';
  document.getElementById('etymology-panel').classList.remove('visible');
  showButtons('reveal');
  document.getElementById('btn-show').disabled = false;
  revealed = false;
  seen++;
  updateStats();
}

function revealAnswer() {
  if (revealed) return;
  document.getElementById('details').classList.remove('hidden');
  document.getElementById('kanji-stats').style.visibility = 'visible';
  document.getElementById('btn-show').disabled = true;
  showButtons('judge');
  revealed = true;
  if (currentEntry) renderTip(currentEntry.kanji);
}

function markKnown() {
  if (!revealed || !currentEntry) return;
  recordResult(currentEntry.kanji, true);
  nextKanji();
}

function markUnknown() {
  if (!revealed || !currentEntry) return;
  const h = loadHistory();
  const rec = h[currentEntry.kanji] || { ok: 0, fail: 0 };
  // 못외운 한자 탭에서 이미 실패 기록이 있으면 풀 재삽입 스킵 (중복 방지)
  const skipReinsert = currentMode === 'review' && rec.fail > 0;

  recordResult(currentEntry.kanji, false);

  if (!skipReinsert) {
    // 못외운 한자를 풀 뒤쪽 랜덤 위치에 다시 삽입
    const insertAt = seen + Math.floor(Math.random() * Math.max(1, Math.min(10, pool.length - seen)));
    pool.splice(insertAt, 0, { ...currentEntry });
  }
  nextKanji();
}

document.addEventListener('keydown', function(ev) {
  if (ev.key === ' ' || ev.key === 'Spacebar') { ev.preventDefault(); revealAnswer(); }
  else if (ev.key === 'ArrowRight') { ev.preventDefault(); if (revealed) markKnown(); }
  else if (ev.key === 'ArrowLeft') { ev.preventDefault(); if (revealed) markUnknown(); }
  else if (ev.key === 'Enter') { ev.preventDefault(); if (!revealed) revealAnswer(); else markKnown(); }
});

document.getElementById('card').addEventListener('click', function() {
  if (!revealed) revealAnswer();
});

init();
</script>

</body>
</html>
