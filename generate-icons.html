<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>아이콘 생성</title></head>
<body style="background:#222;display:flex;flex-direction:column;align-items:center;padding:40px;font-family:sans-serif;color:#fff">
<h2>아이콘 미리보기</h2>
<canvas id="preview" width="512" height="512" style="border-radius:24px;margin:20px 0;width:256px;height:256px"></canvas>
<div style="display:flex;gap:12px;margin-top:8px">
  <button onclick="download(192)" style="padding:10px 24px;background:#6c63ff;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:1rem">icon-192.png 저장</button>
  <button onclick="download(512)" style="padding:10px 24px;background:#6c63ff;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:1rem">icon-512.png 저장</button>
</div>
<canvas id="c" style="display:none"></canvas>

<script>
function drawBear(ctx, size) {
  const s = size / 512;
  ctx.save();
  ctx.scale(s, s);
  const W = 512, H = 512;

  // 배경
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // === 몸통 (아래쪽에 살짝만) ===
  ctx.beginPath();
  ctx.ellipse(256, 530, 110, 70, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#c8845a';
  ctx.fill();

  // === 귀 ===
  // 왼쪽 귀
  ctx.beginPath();
  ctx.ellipse(118, 95, 58, 56, -0.2, 0, Math.PI * 2);
  ctx.fillStyle = '#c8845a';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(120, 98, 33, 31, -0.2, 0, Math.PI * 2);
  ctx.fillStyle = '#e8a87c';
  ctx.fill();

  // 오른쪽 귀
  ctx.beginPath();
  ctx.ellipse(394, 95, 58, 56, 0.2, 0, Math.PI * 2);
  ctx.fillStyle = '#c8845a';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(392, 98, 33, 31, 0.2, 0, Math.PI * 2);
  ctx.fillStyle = '#e8a87c';
  ctx.fill();

  // === 얼굴 (크게, 가로로 늘림) ===
  ctx.beginPath();
  ctx.ellipse(256, 295, 205, 210, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#d4936a';
  ctx.fill();

  // 얼굴 밝은 영역
  ctx.beginPath();
  ctx.ellipse(256, 305, 172, 178, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#e8b48a';
  ctx.fill();

  // === 오른팔 (붓 쥔) — 얼굴 아래 살짝 ===
  ctx.save();
  ctx.translate(390, 460);
  ctx.rotate(-0.4);
  ctx.beginPath();
  ctx.ellipse(0, 0, 28, 55, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#c8845a';
  ctx.fill();
  ctx.restore();

  // === 붓 (크게, 오른쪽 하단) ===
  ctx.save();
  ctx.translate(430, 360);
  ctx.rotate(0.55);

  // 붓대
  ctx.beginPath();
  ctx.roundRect(-16, -170, 32, 210, 7);
  ctx.fillStyle = '#8B6914';
  ctx.fill();
  ctx.strokeStyle = '#6B4F10';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // 금색 링
  ctx.beginPath();
  ctx.rect(-18, 30, 36, 14);
  ctx.fillStyle = '#FFD700';
  ctx.fill();

  // 붓 털
  ctx.beginPath();
  ctx.moveTo(-22, 44);
  ctx.bezierCurveTo(-30, 85, -16, 115, 0, 138);
  ctx.bezierCurveTo(16, 115, 30, 85, 22, 44);
  ctx.closePath();
  ctx.fillStyle = '#1a1a1a';
  ctx.fill();

  // 붓 끝 먹물
  ctx.beginPath();
  ctx.moveTo(-10, 108);
  ctx.bezierCurveTo(-6, 126, -2, 134, 0, 138);
  ctx.bezierCurveTo(2, 134, 6, 126, 10, 108);
  ctx.closePath();
  ctx.fillStyle = '#050505';
  ctx.fill();

  ctx.restore();

  // === 눈 ===
  // 왼쪽 눈
  ctx.beginPath();
  ctx.ellipse(196, 278, 16, 18, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#2c1810';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(191, 271, 5, 5, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  // 오른쪽 눈
  ctx.beginPath();
  ctx.ellipse(316, 278, 16, 18, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#2c1810';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(311, 271, 5, 5, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  // === 안경 (검정) ===
  ctx.lineWidth = 8;
  ctx.strokeStyle = '#111111';
  ctx.lineJoin = 'round';

  // 왼쪽 렌즈
  ctx.beginPath();
  ctx.ellipse(196, 280, 50, 45, 0, 0, Math.PI * 2);
  ctx.stroke();

  // 오른쪽 렌즈
  ctx.beginPath();
  ctx.ellipse(316, 280, 50, 45, 0, 0, Math.PI * 2);
  ctx.stroke();

  // 브릿지
  ctx.beginPath();
  ctx.moveTo(246, 278);
  ctx.lineTo(266, 278);
  ctx.stroke();

  // 왼쪽 다리
  ctx.beginPath();
  ctx.moveTo(146, 265);
  ctx.quadraticCurveTo(118, 255, 108, 240);
  ctx.stroke();

  // 오른쪽 다리
  ctx.beginPath();
  ctx.moveTo(366, 265);
  ctx.quadraticCurveTo(394, 255, 404, 240);
  ctx.stroke();

  // === 코 ===
  ctx.beginPath();
  ctx.ellipse(256, 332, 25, 16, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#3d2010';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(249, 327, 7, 5, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.fill();

  // === 입 ===
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#3d2010';
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(226, 358);
  ctx.quadraticCurveTo(256, 384, 286, 358);
  ctx.stroke();

  // === 볼 홍조 ===
  ctx.beginPath();
  ctx.ellipse(165, 326, 32, 18, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,140,120,0.32)';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(347, 326, 32, 18, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,140,120,0.32)';
  ctx.fill();

  // === 먹물 튄 포인트 ===
  ctx.fillStyle = 'rgba(80,70,200,0.55)';
  [
    [458, 185, 5], [468, 202, 3.5], [452, 215, 4.5], [474, 220, 2.5]
  ].forEach(([x, y, r]) => {
    ctx.beginPath();
    ctx.ellipse(x, y, r, r, 0, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.restore();
}

const preview = document.getElementById('preview');
drawBear(preview.getContext('2d'), 512);

function download(size) {
  const canvas = document.getElementById('c');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  drawBear(ctx, size);
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `icon-${size}.png`;
    a.click();
  });
}
</script>
</body>
</html>
